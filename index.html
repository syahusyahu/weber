<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ARjs PNG Transparent Fixed Size</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <!-- look-at（常に正面） -->
  <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<!-- 画像選択 -->
<div style="position:fixed; top:10px; left:10px; z-index:999; background:white; padding:6px;">
  <input type="file" accept="image/png,image/webp" id="imageInput">
</div>

<a-scene embedded
         vr-mode-ui="enabled: false"
         renderer="alpha: true; antialias: true;"
         arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- 画面表示マーカー向けスムージング -->
  <a-marker preset="hiro"
            smooth="true"
            smoothCount="20"
            smoothTolerance="0.01"
            smoothThreshold="5">

    <!-- ★ 透過PNG対応・サイズ固定・常に正面 -->
    <a-plane id="arImage"
             position="0 0 0"
             rotation="-90 0 0"
             look-at="[camera]"
             width="1.5"
             height="1"
             material="side: double; transparent: true; alphaTest: 0.5; depthWrite: false;">
    </a-plane>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
const input = document.getElementById("imageInput");
const plane = document.getElementById("arImage");

input.addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  // PNG/WEBPのみ推奨（透過保持のため）
  if (!file.type.includes("png") && !file.type.includes("webp")) {
    alert("透過画像はPNGまたはWEBPを選んでください");
    return;
  }

  const reader = new FileReader();
  reader.onload = function(e) {
    plane.setAttribute("material", "src", e.target.result);
  };
  reader.readAsDataURL(file);
});
</script>

</body>
</html>
