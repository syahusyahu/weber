<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ARjs Screen Marker Mode</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <!-- look-at コンポーネント -->
  <script src="https://unpkg.com/aframe-look-at-component@1.0.0/dist/aframe-look-at-component.min.js"></script>
</head>

<body style="margin:0; overflow:hidden;">

<!-- 画像選択ボタン -->
<div style="position:fixed; top:10px; left:10px; z-index:999; background:white; padding:6px;">
  <input type="file" accept="image/*" id="imageInput">
</div>

<a-scene embedded
         vr-mode-ui="enabled: false"
         arjs="sourceType: webcam; debugUIEnabled: false;">

  <!-- 画面表示マーカー向け安定設定 -->
  <a-marker preset="hiro"
            smooth="true"
            smoothCount="20"
            smoothTolerance="0.01"
            smoothThreshold="5">

    <!-- 常に正面を向く板 -->
    <a-plane id="arImage"
             position="0 0 0"
             rotation="-90 0 0"
             look-at="[camera]"
             material="side: double;">
    </a-plane>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>
const input = document.getElementById("imageInput");
const plane = document.getElementById("arImage");

input.addEventListener("change", function(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(e) {

    const img = new Image();
    img.onload = function() {

      const aspect = img.width / img.height;

      // 高さ1固定、横幅を比率で調整
      plane.setAttribute("height", 1);
      plane.setAttribute("width", aspect);

      plane.setAttribute("material", "src", e.target.result);
    };

    img.src = e.target.result;
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
